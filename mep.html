  <style>
    /* CSS Khusus Mode Malam (Langsung Aktif) */
    body.dark-mode {
      background-color: #0b0e14;
      color: #ffffff;
    }
    .navbar.dark-theme {
      border-bottom: 2px solid #00d4ff;
    }

    /* CSS Grid Box ala Gambar yang Mas kirim */
    .mep-container {
      padding: 80px 0;
    }
    .mep-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }
    .mep-box {
      background: #11141b;
      border: 1px solid #2d333b;
      border-radius: 20px;
      padding: 40px 20px;
      text-align: center;
      text-decoration: none;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    /* Efek Neon saat Hover */
    .mep-box:hover {
      border-color: #00d4ff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
      transform: translateY(-10px);
    }
    .mep-icon {
      font-size: 40px;
      color: #ff4d4d; /* Warna icon default merah seperti gambar */
      margin-bottom: 15px;
    }
    .mep-label {
      font-weight: bold;
      font-size: 1.2rem;
      color: #ffffff;
      margin-bottom: 5px;
    }
    .mep-sub {
      font-size: 0.85rem;
      color: #8b949e;
    }
  </style>
</head>
